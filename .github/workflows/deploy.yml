name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to gecko-water
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.GECKO_WATER_HOST }}
      DEPLOY_USER: ${{ secrets.GECKO_WATER_USER }}
      DEPLOY_PATH: ${{ vars.GECKO_WATER_DEPLOY_PATH || '/home/exedev/news-aggregator' }}
      PM2_APP_NAME: ${{ vars.GECKO_WATER_PM2_APP_NAME || 'news-aggregator' }}
      PORT: ${{ vars.GECKO_WATER_PORT || '3001' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Validate dependencies
        run: |
          npm ci

      - name: Run tests
        run: |
          npm test

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GECKO_WATER_DEPLOY_KEY }}
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PATH"
          test -n "$SSH_PRIVATE_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Update checkout on gecko-water
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -e; cd '$DEPLOY_PATH'; git fetch --prune origin main; git reset --hard origin/main"

      - name: Build and reload PM2 on gecko-water
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && PM2_APP_NAME='$PM2_APP_NAME' PORT='$PORT' bash scripts/remote-deploy.sh"
